<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
  body{background:#0a0a14;color:#fff;font-family:'Segoe UI',sans-serif;padding:20px}
 .card{background:#161625;border-radius:16px;padding:20px;margin:15px 0;border:1px solid #2a2a40}
  input,button{padding:12px;margin:5px;border-radius:8px;border:none;background:#1f1f35;color:#fff}
  button{background:linear-gradient(90deg,#7b2cbf,#00f7ff);cursor:pointer}
  table{width:100%;border-collapse:collapse}
  td,th{padding:10px;border-bottom:1px solid #2a2a40;text-align:left}
</style>
</head>
<body>
<h1>⚙️ Admin Dashboard</h1>

<div class="card">
  <h3>1. Ajouter/Modifier Tarifs</h3>
  <input id="pname" placeholder="Nom du pack">
  <input id="pdiamonds" type="number" placeholder="Diamonds">
  <input id="pprice" type="number" placeholder="Prix FCFA">
  <input id="plogo" placeholder="URL Logo">
  <button onclick="addPrice()">Ajouter</button>
</div>

<div class="card">
  <h3>2. Ajouter Opérateur de Paiement</h3>
  <input id="opname" placeholder="Nom Opérateur ex: MTN">
  <input id="opnumber" placeholder="Numéro">
  <button onclick="addOperator()">Ajouter</button>
</div>

<div class="card">
  <h3>3. Commandes Clients</h3>
  <table id="ordersTable"></table>
</div>

<script>
const token = localStorage.getItem('token');

async function addPrice(){
  await fetch('/api/admin/price',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({name:pname.value,diamonds:pdiamonds.value,price:pprice.value,logoUrl:plogo.value})
  });
  alert('Pack ajouté');
}

async function addOperator(){
  await fetch('/api/admin/operator',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({name:opname.value,number:opnumber.value})
  });
  alert('Opérateur ajouté');
}

async function loadOrders(){
  const res = await fetch('/api/admin/orders',{headers:{'Authorization':'Bearer '+token}});
  const orders = await res.json();
  document.getElementById('ordersTable').innerHTML = '<tr><th>UID</th><th>Pseudo</th><th>Pack</th><th>Ref</th><th>Status</th><th>Action</th></tr>'+
    orders.map(o=>`<tr>
      <td>${o.uid}</td><td>${o.pseudo}</td><td>${o.packId}</td><td>${o.reference}</td>
      <td>${o.status}</td>
      <td><button onclick="updateOrder(${o.id},'completed')">Valider</button></td>
    </tr>`).join('');
}
async function updateOrder(id,status){
  await fetch('/api/admin/order/'+id,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({status})});
  loadOrders();
}
loadOrders();
</script>
</body>
  </html>
